name: Custom Kernel Builder (The Brickmaker 9000)

on:
  workflow_dispatch: # Canın ne zaman sıkılırsa butona basıp başlat diye

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Çek
      uses: actions/checkout@v4

    - name: Ortamı Hazırla (Savaş Alanı)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev clang lld llvm

    - name: Toolchain İndir (Google NDK r16 Zip)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        
        # Google'dan zip'i çekiyoruz
        wget https://android.googlesource.com/toolchain/prebuilts/ndk/r16/+archive/refs/heads/master.tar.gz
        
        # Dur lan, bu link googlesource olunca sonuna ne yazarsan yaz tar.gz veya zip olarak içeriği dinamik basar.
        # Dosya adını ndk.tar.gz yapıp açalım en temizi:
        mv r16 ndk.tar.gz 2>/dev/null || mv master.tar.gz ndk.tar.gz 2>/dev/null || true
        tar -xf ndk.tar.gz || unzip r16
        
        # NDK'nın o meşhur derin bin klasörünü PATH'e ekliyoruz ki sistem şaşırmasın:
        echo "$GITHUB_WORKSPACE/toolchain/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    - name: KernelSU Entegre Et (Rootsuz Yaşayamayanlar İçin)
      run: |
        # Kernel kaynak kodunun içine KernelSU'yu enjekte ediyoruz
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

    - name: Overclock Ayarları (Cihazı Eritme Aşaması)
      run: |
        echo "Frekans modifikasyonu basliyor..."
        find arch/arm64/boot/dts/ -name "*.dts*" -type f -exec sed -i "s/opp-hz = \/bits\/ 64 <[0-9]*>/opp-hz = \/bits\/ 64 <2300000000>/g" {} +
        find arch/arm64/boot/dts/ -name "*.dts*" -type f -exec sed -i "s/gpu_freq = <[0-9]*>/gpu_freq = <900000000>/g" {} +
        echo "Islem tamamlandi!"

    - name: Derleme Zamanı
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        # NDK içindeki clang yolunu tam olarak gösteriyoruz:
        export CC=$GITHUB_WORKSPACE/toolchain/toolchains/llvm/prebuilt/linux-x86_64/bin/clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=$GITHUB_WORKSPACE/toolchain/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-
        
        make gta7litewifi_00_defconfig
        make -j$(nproc)

    - name: Artefaktı Paketle ve Fırlat
      uses: actions/upload-artifact@v4
      with:
        name: Overclocked-KernelSU-Kernel
        path: arch/arm64/boot/Image.gz-dtb # Veya cihazın hangi formatı yiyorsa
